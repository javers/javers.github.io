<script>
(function() {
    var deadline = new Date('2026-06-30T23:59:59').getTime();
    function pad(n) { return n < 10 ? '0' + n : n; }
    function tick() {
        var diff = deadline - Date.now();
        if (diff <= 0) return;
        document.getElementById('pb-days').textContent = pad(Math.floor(diff / 86400000));
        document.getElementById('pb-hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
        document.getElementById('pb-mins').textContent = pad(Math.floor((diff % 3600000) / 60000));
        document.getElementById('pb-secs').textContent = pad(Math.floor((diff % 60000) / 1000));
    }
    tick();
    setInterval(tick, 1000);
})();
</script>
